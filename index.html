<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pas Photo (ChatGPT API)</title>
    <style>
        :root {
            --primary: #10a37f; /* ChatGPT Green */
            --bg: #343541;
            --card: #444654;
            --text: #ececf1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid #565869;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        .subtitle { text-align: center; color: #acacbe; margin-bottom: 2rem; font-size: 0.9rem; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media(max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #d9d9e3; font-size: 0.9rem; }
        
        .worker-input {
            width: 100%;
            background: #202123;
            border: 1px solid #565869;
            color: var(--primary);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
        }

        .upload-area {
            border: 2px dashed #565869;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            position: relative;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #202123;
            overflow: hidden;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-area input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .preview-img { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        .upload-text { pointer-events: none; color: #8e8ea0; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn {
            background: #343541;
            border: 1px solid #565869;
            color: #ececf1;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .option-btn:hover { background: #40414f; }
        .option-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        select {
            width: 100%; padding: 10px; background: #343541; color: white; border: 1px solid #565869; border-radius: 6px;
        }

        .btn-gen {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn-gen:hover { opacity: 0.9; }
        .btn-gen:disabled { background: #565869; cursor: not-allowed; }

        .status-box {
            background: #202123;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #8e8ea0;
            margin-top: 10px;
            min-height: 40px;
            border: 1px solid #565869;
        }

        .result-area {
            background: #202123;
            border-radius: 8px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #565869;
            position: relative;
        }
        .result-img { width: 100%; height: auto; display: none; object-fit: contain; }
        
        .loader {
            width: 40px; height: 40px;
            border: 4px solid #343541;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .note { font-size: 0.75rem; color: #8e8ea0; margin-top: 5px; }
        .badge { background: #343541; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }

    </style>
</head>
<body>

<div class="container">
    <h1>AI Pas Photo <span class="badge">ChatGPT API</span></h1>
    <div class="subtitle">Backend via Cloudflare Worker | Frontend via GitHub Pages</div>

    <div class="grid">
        <!-- LEFT -->
        <div>
            <div class="form-group">
                <label>1. URL Cloudflare Worker</label>
                <input type="text" id="workerUrl" class="worker-input" placeholder="https://nama-worker.workers.dev">
                <div class="note">Masukkan URL Worker dari Langkah 1.</div>
            </div>

            <div class="form-group">
                <label>2. Upload Foto Wajah</label>
                <div class="upload-area">
                    <input type="file" id="imgInput" accept="image/*">
                    <div class="upload-text" id="uploadText">Klik untuk Upload Foto</div>
                    <img id="preview" class="preview-img">
                </div>
            </div>

            <div class="form-group">
                <label>3. Pilih Pakaian</label>
                <div class="options">
                    <button class="option-btn active" onclick="setClothing('pria-jas')">Pria Jas & Dasi</button>
                    <button class="option-btn" onclick="setClothing('pria-kemeja')">Pria Kemeja Putih</button>
                    <button class="option-btn" onclick="setClothing('wanita-jas')">Wanita Jas & Dasi</button>
                    <button class="option-btn" onclick="setClothing('wanita-kemeja')">Wanita Kemeja Putih</button>
                    <button class="option-btn" onclick="setClothing('wanita-hijab-jas')">Hijab & Jas</button>
                    <button class="option-btn" onclick="setClothing('wanita-hijab-kemeja')">Hijab & Kemeja</button>
                </div>
            </div>

            <div class="form-group">
                <label>4. Warna Background</label>
                <select id="bgColor">
                    <option value="red">Merah (Standard)</option>
                    <option value="blue">Biru (Standard)</option>
                    <option value="grey">Abu-abu</option>
                    <option value="white">Putih</option>
                </select>
            </div>

            <button class="btn-gen" id="genBtn" onclick="runGeneration()">✨ GENERATE (ChatGPT)</button>
            <div class="status-box" id="statusLog">Menunggu input...</div>
        </div>

        <!-- RIGHT -->
        <div>
            <label>Hasil DALL-E 3</label>
            <div class="result-area">
                <div id="placeholder" style="color:#555">Hasil foto muncul di sini</div>
                <div class="loader" id="loader"></div>
                <img id="resultImg" class="result-img">
            </div>
            <div class="note" style="margin-top:10px; text-align:center;">Biaya sekitar $0.04 - $0.12 per gambar.</div>
        </div>
    </div>
</div>

<script>
    // --- CONFIG ---
    let state = {
        clothing: 'pria-jas',
        base64Img: null
    };

    const clothingMap = {
        'pria-jas': 'wearing a professional black suit and black tie',
        'pria-kemeja': 'wearing a clean white formal shirt',
        'wanita-jas': 'wearing a professional black blazer and tie',
        'wanita-kemeja': 'wearing a clean white formal blouse',
        'wanita-hijab-jas': 'wearing a professional black blazer, black tie, and a black or grey hijab',
        'wanita-hijab-kemeja': 'wearing a clean white blouse and a beige or grey hijab'
    };

    // --- EVENTS ---
    document.getElementById('imgInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = (evt) => {
                state.base64Img = evt.target.result;
                document.getElementById('preview').src = state.base64Img;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('uploadText').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    function setClothing(type) {
        state.clothing = type;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    // --- LOGIC: CALL CLOUDFLARE WORKER ---
    async function runGeneration() {
        const workerUrl = document.getElementById('workerUrl').value.trim();
        const status = document.getElementById('statusLog');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');
        const resultImg = document.getElementById('resultImg');
        const btn = document.getElementById('genBtn');

        if (!workerUrl) return alert("Masukkan URL Cloudflare Worker Anda (Langkah 1).");
        if (!state.base64Img) return alert("Upload foto dulu.");

        btn.disabled = true;
        status.innerText = ">>> Mengirim ke Worker...";
        loader.style.display = 'block';
        placeholder.style.display = 'none';
        resultImg.style.display = 'none';

        try {
            const bgColor = document.getElementById('bgColor').value;
            const clothingDesc = clothingMap[state.clothing];

            const response = await fetch(workerUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    imageBase64: state.base64Img,
                    clothing: clothingDesc,
                    bg: bgColor
                    // API Key tidak perlu dikirim jika sudah di-set di Worker Variable
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || "Gagal menghubungi Worker");
            }

            const data = await response.json();
            
            if(data.error) throw new Error(data.error);

            // Handle DALL-E Response
            const b64Json = data.data[0].b64_json;
            
            resultImg.src = `data:image/png;base64,${b64Json}`;
            resultImg.style.display = 'block';
            loader.style.display = 'none';
            status.innerText = ">>> ✅ SELESAI!";

        } catch (error) {
            console.error(error);
            status.innerText = ">>> ❌ ERROR: " + error.message;
            alert("Gagal: " + error.message);
            loader.style.display = 'none';
            placeholder.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
